<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure Data Hiding{% endblock %} | Steganography</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #00d4aa;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Three.js Canvas Background */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Navbar */
        .navbar {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--highlight), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, var(--highlight), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 0.5rem;
        }

        .nav-link {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-secondary) !important;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 1.5rem !important;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--highlight) !important;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--highlight), var(--success));
            transition: width 0.3s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 80%;
        }

        /* Glass Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--highlight);
            box-shadow: var(--glow);
            transform: translateY(-5px);
        }

        /* Buttons */
        .btn-glow {
            background: linear-gradient(135deg, var(--highlight), #ff6b6b);
            border: none;
            padding: 0.8rem 2rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 50px;
            color: white;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-glow:hover::before {
            left: 100%;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            color: white;
        }

        .btn-success-glow {
            background: linear-gradient(135deg, var(--success), #00ff88);
        }

        .btn-success-glow:hover {
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.4);
        }

        /* Form Controls */
        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--highlight);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.2);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .form-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        /* File Upload Area */
        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--highlight);
            background: rgba(233, 69, 96, 0.1);
        }

        .upload-area i {
            font-size: 4rem;
            color: var(--highlight);
            margin-bottom: 1rem;
        }

        .upload-area h4 {
            font-family: 'Rajdhani', sans-serif;
            margin-bottom: 0.5rem;
        }

        .upload-area p {
            color: var(--text-secondary);
            margin: 0;
        }

        /* Image Preview */
        .image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            border: 2px solid var(--glass-border);
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        /* Headings */
        h1,
        h2,
        h3 {
            font-family: 'Orbitron', sans-serif;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Alert Styling */
        .alert {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            color: var(--text-primary);
        }

        .alert-danger {
            border-color: var(--highlight);
            background: rgba(233, 69, 96, 0.2);
        }

        .alert-success {
            border-color: var(--success);
            background: rgba(0, 212, 170, 0.2);
        }

        /* Main Container */
        .main-container {
            padding: 100px 0 50px;
            min-height: 100vh;
        }

        /* Footer */
        footer {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
        }

        /* Capacity Chart Container */
        .chart-container {
            max-width: 250px;
            margin: 0 auto;
        }

        /* Message Box */
        .decoded-message {
            background: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--success);
            border-radius: 15px;
            padding: 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            line-height: 1.8;
            word-break: break-word;
        }

        /* Animations */
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .floating {
            animation: float 6s ease-in-out infinite;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--highlight);
            border-radius: 4px;
        }

        /* Stats Cards */
        .stat-card {
            text-align: center;
            padding: 1.5rem;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--highlight);
        }

        .stat-label {
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Copy Button */
        .btn-copy {
            background: transparent;
            border: 1px solid var(--success);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-copy:hover {
            background: var(--success);
            color: var(--primary);
        }

        /* Loading Spinner */
        .spinner-border {
            border-color: var(--highlight);
            border-right-color: transparent;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- Three.js Background Canvas -->
    <canvas id="three-canvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'stego_app:home' %}">
                <i class="bi bi-shield-lock-fill"></i>
                SecureHide
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                            href="{% url 'stego_app:home' %}">
                            <i class="bi bi-house-door me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'encode' %}active{% endif %}"
                            href="{% url 'stego_app:encode' %}">
                            <i class="bi bi-lock-fill me-1"></i>Encode
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'decode' %}active{% endif %}"
                            href="{% url 'stego_app:decode' %}">
                            <i class="bi bi-unlock-fill me-1"></i>Decode
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                            href="{% url 'stego_app:dashboard' %}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p class="mb-0">
                <i class="bi bi-shield-check me-2"></i>
                <strong>SecureHide</strong> - Advanced Image Steganography | LSB Technique
            </p>
            <small class="text-muted">Your messages are hidden in plain sight</small>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Three.js Background Animation -->
    <script>
        // Three.js Animated Background
        (function () {
            const canvas = document.getElementById('three-canvas');
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // Particles
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 2000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorsArray = new Float32Array(particlesCount * 3);

            for (let i = 0; i < particlesCount * 3; i += 3) {
                posArray[i] = (Math.random() - 0.5) * 100;
                posArray[i + 1] = (Math.random() - 0.5) * 100;
                posArray[i + 2] = (Math.random() - 0.5) * 100;

                // Random colors between highlight (red) and success (teal)
                const mixFactor = Math.random();
                colorsArray[i] = 0.91 * (1 - mixFactor) + 0 * mixFactor;       // R
                colorsArray[i + 1] = 0.27 * (1 - mixFactor) + 0.83 * mixFactor; // G
                colorsArray[i + 2] = 0.37 * (1 - mixFactor) + 0.67 * mixFactor; // B
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particlesMesh);

            // Geometric shapes
            const geometries = [
                new THREE.IcosahedronGeometry(2, 0),
                new THREE.OctahedronGeometry(1.5),
                new THREE.TetrahedronGeometry(1.8)
            ];

            const shapes = [];
            for (let i = 0; i < 5; i++) {
                const geometry = geometries[i % geometries.length];
                const material = new THREE.MeshBasicMaterial({
                    color: Math.random() > 0.5 ? 0xe94560 : 0x00d4aa,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.3
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 20
                );
                mesh.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                shapes.push({
                    mesh,
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.01,
                        y: (Math.random() - 0.5) * 0.01,
                        z: (Math.random() - 0.5) * 0.01
                    }
                });
                scene.add(mesh);
            }

            // Mouse movement effect
            let mouseX = 0;
            let mouseY = 0;
            document.addEventListener('mousemove', (event) => {
                mouseX = (event.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            });

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);

                // Rotate particles
                particlesMesh.rotation.y += 0.0005;
                particlesMesh.rotation.x += 0.0002;

                // Move particles based on mouse
                particlesMesh.rotation.y += mouseX * 0.0005;
                particlesMesh.rotation.x += mouseY * 0.0005;

                // Animate shapes
                shapes.forEach(shape => {
                    shape.mesh.rotation.x += shape.rotationSpeed.x;
                    shape.mesh.rotation.y += shape.rotationSpeed.y;
                    shape.mesh.rotation.z += shape.rotationSpeed.z;
                });

                renderer.render(scene, camera);
            }

            animate();

            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
